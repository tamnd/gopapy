name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref; saves minutes on force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  oracle:
    name: cpython oracle diff
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: tests/run.sh
        run: ./tests/run.sh

  stdlib-parse:
    name: cpython 3.14 stdlib parse
    runs-on: ubuntu-latest
    needs: test
    # Phase 1 complete: 1842/1842 stdlib files parse. Hard gate.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: build gopapy
        run: go build -o bin/gopapy ./cmd/gopapy

      - name: gopapy check stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy check "$PYDIR"

      - name: gopapy symbols stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy symbols "$PYDIR"

      - name: gopapy diag stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy diag "$PYDIR"

      - name: gopapy unparse --check stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy unparse --check "$PYDIR"

      - name: gopapy unparse --check --comments stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy unparse --check --comments "$PYDIR"

      - name: gopapy lint stdlib (informational)
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy lint "$PYDIR" >/dev/null 2> /tmp/lint.summary
          tail -1 /tmp/lint.summary
        continue-on-error: true

  # compat-oracle: per-Python-version oracle diff for grammar fixtures.
  # Matrix: python-version x os. Each cell installs the target Python via uv
  # and runs `go test ./tests/compat/` which selects the matching test function.
  # Python 3.13 oracle passes today. Python 3.12 and below are skipped inside
  # the Go test until version-aware dump is implemented (spec 1323-1324).
  compat-oracle:
    name: oracle ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13', '3.12', '3.11', '3.10', '3.9', '3.8']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }} via uv
        run: uv python install ${{ matrix.python-version }}

      - name: Print tool versions
        run: |
          go version
          uv python find ${{ matrix.python-version }}

      - name: go test compat oracle (Python ${{ matrix.python-version }})
        run: go test ./tests/compat/... -run TestOracle_Py -v -timeout 120s

  # stdlib-compat: parse and round-trip the standard library for each Python
  # version. Informational until each version reaches zero failures (v0.3.5+).
  stdlib-compat:
    name: stdlib ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: false

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: build gopapy
        run: go build -o bin/gopapy ./cmd/gopapy

      - name: gopapy check stdlib (${{ matrix.python-version }})
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          echo "stdlib: $PYDIR"
          bin/gopapy check "$PYDIR" || true

      - name: gopapy unparse --check stdlib (${{ matrix.python-version }})
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy unparse --check "$PYDIR" || true

      - name: grammar fixtures oracle (${{ matrix.python-version }})
        run: ./tests/run.sh || true

  fuzz:
    name: fuzz pass
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Print tool versions
        run: go version

      - name: fuzz lex.Scan
        run: go test ./lex -run='^$' -fuzz=FuzzScan -fuzztime=30s

      - name: fuzz parser.ParseFile
        run: go test ./parser -run='^$' -fuzz=FuzzParseFile -fuzztime=30s

      - name: fuzz ast.Emit
        run: go test ./ast -run='^$' -fuzz=FuzzEmit -fuzztime=30s

  bench:
    name: bench
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Print tool versions
        run: go version

      - name: go test -bench
        run: go test -run='^$' -bench=. -benchtime=3x -benchmem ./lex ./parser ./symbols
