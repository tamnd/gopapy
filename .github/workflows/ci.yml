name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref; saves minutes on force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  oracle:
    name: cpython oracle diff
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: tests/run.sh
        run: ./tests/run.sh

  stdlib-parse:
    name: cpython 3.14 stdlib parse
    runs-on: ubuntu-latest
    needs: test
    # Phase 1 complete: 1842/1842 stdlib files parse. Hard gate.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: build gopapy
        run: go build -o bin/gopapy ./cmd/gopapy

      - name: gopapy check stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy check "$PYDIR"

      - name: gopapy symbols stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy symbols "$PYDIR"

      - name: gopapy diag stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy diag "$PYDIR"

      - name: gopapy unparse --check stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy unparse --check "$PYDIR"

      - name: gopapy unparse --check --comments stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy unparse --check --comments "$PYDIR"

      - name: gopapy lint stdlib (informational)
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy lint "$PYDIR" >/dev/null 2> /tmp/lint.summary
          tail -1 /tmp/lint.summary
        continue-on-error: true

  # compat-oracle: per-Python-version oracle diff for grammar fixtures.
  # Matrix: python-version x os. Each cell installs the target Python via uv
  # and runs `go test ./tests/compat/` which selects the matching test function.
  # Version-aware dump is complete: ASTDump respects pyMinor for showEmpty
  # (3.12 and below) and py38 fields (3.8). Oracle tests for 3.8-3.14 are live.
  compat-oracle:
    name: oracle ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.13', '3.12', '3.11', '3.10', '3.9', '3.8']
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install Python ${{ matrix.python-version }} via uv
        run: uv python install ${{ matrix.python-version }}

      - name: Print tool versions
        run: |
          go version
          uv python find ${{ matrix.python-version }}

      - name: go test compat oracle (Python ${{ matrix.python-version }})
        run: go test ./tests/compat/... -run TestOracle_Py -v -timeout 120s

  # stdlib-compat: parse and round-trip the standard library for each Python
  # version. Phase 1.5 complete: all versions at zero failures. Hard gate.
  stdlib-compat:
    name: stdlib ${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12', '3.13']
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: false

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: build gopapy
        run: go build -o bin/gopapy ./cmd/gopapy

      - name: gopapy check stdlib (${{ matrix.python-version }})
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          echo "stdlib: $PYDIR"
          bin/gopapy check "$PYDIR"

      - name: gopapy unparse --check stdlib (${{ matrix.python-version }})
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy unparse --check "$PYDIR"

  # corpus-parse: run gopapy check against the 50-package PyPI corpus.
  # Hard gate as of v0.5.3: 12179 files parse, intentionally-invalid fixtures skipped.
  # Also runs corpus-stats (throughput + health summary) after the parse gate.
  corpus-parse:
    name: corpus parse
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: corpus cache restore
        id: corpus-cache
        uses: actions/cache@v4
        with:
          path: corpus/src
          key: corpus-src-${{ hashFiles('corpus/packages.txt') }}

      - name: download corpus
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          pip install --upgrade pip
          bash corpus/download.sh

      - name: save corpus cache
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: corpus/src
          key: corpus-src-${{ hashFiles('corpus/packages.txt') }}

      - name: build gopapy
        run: go build -o bin/gopapy ./cmd/gopapy

      - name: gopapy check corpus
        run: bash corpus/check.sh

      - name: corpus stats
        run: bash corpus/stats.sh

  # corpus-roundtrip: run gopapy unparse --check against the corpus.
  # Hard gate as of v0.5.2: 2 known legacy-unparser limitations allowed via --allow.
  corpus-roundtrip:
    name: corpus roundtrip
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: corpus cache restore
        id: corpus-cache
        uses: actions/cache@v4
        with:
          path: corpus/src
          key: corpus-src-${{ hashFiles('corpus/packages.txt') }}

      - name: download corpus
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          pip install --upgrade pip
          bash corpus/download.sh

      - name: save corpus cache
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: corpus/src
          key: corpus-src-${{ hashFiles('corpus/packages.txt') }}

      - name: build gopapy
        run: go build -o bin/gopapy ./cmd/gopapy

      - name: gopapy unparse --check corpus
        run: bash corpus/roundtrip.sh

  # corpus-astdiff: compare gopapy dump vs CPython ast.dump on a random sample.
  # Seed defaults to YYYYMMDD so each day's sample differs but is reproducible.
  # Hard gate as of v0.5.1: MISMATCH_ALLOW is empty; all sampled files must match.
  corpus-astdiff:
    name: corpus astdiff
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: corpus cache restore
        id: corpus-cache
        uses: actions/cache@v4
        with:
          path: corpus/src
          key: corpus-src-${{ hashFiles('corpus/packages.txt') }}

      - name: download corpus
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        run: |
          pip install --upgrade pip
          bash corpus/download.sh

      - name: save corpus cache
        if: steps.corpus-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: corpus/src
          key: corpus-src-${{ hashFiles('corpus/packages.txt') }}

      - name: build gopapy
        run: go build -o bin/gopapy ./cmd/gopapy

      - name: corpus astdiff (500 files)
        run: bash internal/oracle/corpus_diff.sh 500

      - name: upload diff log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: corpus-astdiff-log-${{ github.run_id }}
          path: corpus_diff.log

  fuzz:
    name: fuzz pass
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Print tool versions
        run: go version

      - name: fuzz lex.Scan
        run: go test ./lex -run='^$' -fuzz=FuzzScan -fuzztime=30s

      - name: fuzz parser.ParseFile
        run: go test ./parser -run='^$' -fuzz=FuzzParseFile -fuzztime=30s

      - name: fuzz ast.Emit
        run: go test ./ast -run='^$' -fuzz=FuzzEmit -fuzztime=30s

  bench:
    name: bench
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Print tool versions
        run: go version

      - name: go test -bench
        run: go test -run='^$' -bench=. -benchtime=3x -benchmem ./lex ./parser ./symbols
