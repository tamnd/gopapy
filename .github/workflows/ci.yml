name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref; saves minutes on force-pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: go test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Print tool versions
        run: go version

      - name: go vet
        run: go vet ./...

      - name: go build
        run: go build ./...

      - name: go test
        run: go test ./...

  oracle:
    name: cpython oracle diff
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: tests/run.sh
        run: ./tests/run.sh

  stdlib-parse:
    name: cpython 3.14 stdlib parse
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.14'

      - name: Print tool versions
        run: |
          go version
          python3 --version

      - name: build gopapy
        run: go build -o bin/gopapy ./cmd/gopapy

      - name: gopapy check stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy check "$PYDIR"

      - name: gopapy symbols stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy symbols "$PYDIR"

      - name: gopapy diag stdlib
        run: |
          PYDIR=$(python3 -c "import sysconfig; print(sysconfig.get_paths()['stdlib'])")
          bin/gopapy diag "$PYDIR"

  fuzz:
    name: fuzz pass
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Print tool versions
        run: go version

      # 30 s per target keeps the PR-blocking budget under 2 min while
      # still exercising the corpus mutator past the seed set. Crashes
      # land in testdata/fuzz/<Name>/ and become permanent regression
      # seeds in the same PR that fixes them.
      - name: fuzz lex.Scan
        run: go test ./lex -run='^$' -fuzz=FuzzScan -fuzztime=30s

      - name: fuzz parser.ParseFile
        run: go test ./parser -run='^$' -fuzz=FuzzParseFile -fuzztime=30s

      - name: fuzz ast.Emit
        run: go test ./ast -run='^$' -fuzz=FuzzEmit -fuzztime=30s

  bench:
    name: bench
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Print tool versions
        run: go version

      # Print parser/lex/symbols benchmark numbers on every PR. This is
      # an information channel for reviewers, not a hard gate — see
      # notes/Spec/1100/1132 for why hard alloc-budget gating is
      # deferred to the next version.
      - name: go test -bench
        run: go test -run='^$' -bench=. -benchtime=3x -benchmem ./lex ./parser ./symbols
